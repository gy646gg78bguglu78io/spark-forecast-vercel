// ─── Utility Functions ───────────────────────────────────
const fmt = (n) => {
  if (n === undefined || n === null) return "£0";
  const abs = Math.abs(n);
  if (abs >= 1000) return (n < 0 ? "-" : "") + "£" + abs.toLocaleString("en-GB", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (n < 0 ? "-" : "") + "£" + abs.toFixed(0);
};

const fmtK = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1000) return (n < 0 ? "-" : "") + "£" + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
  return fmt(n);
};

const monthIndex = (m) => MONTHS.indexOf(m);
const monthKey = (m, y) => `${y}-${String(MONTHS.indexOf(m) + 1).padStart(2, "0")}`;

// Date helpers for show pipeline
function formatDateUK(dateStr) {
  if (!dateStr) return "—";
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

function migrateShowDates(shows) {
  return shows.map(s => {
    if (s.date) return s;
    const mi = MONTHS.indexOf(s.month);
    const y = s.year || 2026;
    const m = mi >= 0 ? mi : 0;
    return { ...s, date: `${y}-${String(m + 1).padStart(2, '0')}-15` };
  });
}

// UK VAT quarter helpers
const VAT_QUARTER_END_MONTHS = [2, 5, 8, 11]; // Mar, Jun, Sep, Dec
const VAT_PAYMENT_MONTHS = [4, 7, 10, 1]; // May, Aug, Nov, Feb (1mo+7d after quarter end)
const VAT_PAYMENT_LABELS = { 2: "7 May", 5: "7 Aug", 8: "7 Nov", 11: "7 Feb" };

function generateMonthRange(startYear, startMonth, count) {
  const result = [];
  let y = startYear, m = startMonth;
  for (let i = 0; i < count; i++) {
    result.push({ month: MONTHS[m], year: y, key: `${y}-${String(m + 1).padStart(2, "0")}`, label: `${MONTHS[m]} ${y}` });
    m++;
    if (m >= 12) { m = 0; y++; }
  }
  return result;
}

// ─── Loan Amortization Helpers ─────────────────────────
function calcMonthlyPayment(principal, annualRate, remainingMonths) {
  if (remainingMonths <= 0 || principal <= 0) return 0;
  if (annualRate === 0) return principal / remainingMonths;
  const r = annualRate / 100 / 12;
  return principal * (r * Math.pow(1 + r, remainingMonths)) / (Math.pow(1 + r, remainingMonths) - 1);
}

function buildLoanSchedule(loan, monthRange) {
  const schedule = [];
  let bal = loan.outstandingBalance;
  const r = loan.annualRate / 100 / 12;
  const pmt = calcMonthlyPayment(loan.outstandingBalance, loan.annualRate, loan.remainingMonths);
  let started = !loan.startDate;
  monthRange.forEach(mr => {
    let cashIn = 0;
    if (loan.startDate && !started) {
      const startK = monthKey(loan.startDate.month, loan.startDate.year);
      if (mr.key >= startK) { started = true; cashIn = loan.outstandingBalance; bal = loan.outstandingBalance; }
    }
    if (!started || bal <= 0) {
      schedule.push({ ...mr, payment: 0, interest: 0, capital: 0, balance: bal, cashIn });
      return;
    }
    const interest = bal * r;
    const capital = Math.min(pmt - interest, bal);
    bal = Math.max(bal - capital, 0);
    schedule.push({ ...mr, payment: interest + capital, interest, capital, balance: bal, cashIn });
  });
  return schedule;
}

// ─── Corporation Tax Helpers ──────────────────────────
function calcCTPaymentMonth(fyEndMonth) {
  // CT due 9 months + 1 day after FY end → effectively 10 months later
  return (fyEndMonth + 10) % 12;
}

// ─── Shared Calculation Engine ─────────────────────────
function calculateCashflow({ shows, costGroups, projects, otherIncome, openingBalance, scenario, monthRange, vatSettings, loans = [], ctSettings = null, openingBalances = null }) {
  const sc = SCENARIOS[scenario];
  let balance = openingBalance;
  let vatAccumulator = 0;
  let vatPending = 0;

  // Pre-compute loan schedules
  const loanSchedules = loans.filter(l => l.enabled !== false).map(l => buildLoanSchedule(l, monthRange));

  // CT tracking
  const hasCT = ctSettings && ctSettings.rate > 0;
  let fyTaxableProfit = 0;
  let ctPendingPayments = [];
  const ctPayMonthIdx = hasCT ? calcCTPaymentMonth(ctSettings.fyEndMonth) : -1;
  let seenFirstFYEnd = false;

  // Opening CT payments
  if (openingBalances && openingBalances.openingCT) {
    openingBalances.openingCT.forEach(ct => {
      if (ct.amount > 0) {
        ctPendingPayments.push({ amount: ct.amount, payMonthIdx: calcCTPaymentMonth(ct.fyEndMonth), paid: false });
      }
    });
  }

  // Opening VAT
  let openingVatRemaining = openingBalances?.openingVatOwed || 0;

  return monthRange.map((mr, idx) => {
    const mi = monthIndex(mr.month);

    // ── Income ──
    const monthShows = shows.filter(s => s.month === mr.month && s.year === mr.year);
    const rawShowIncome = monthShows.reduce((s, sh) => s + sh.fee * STATUS_CONFIG[sh.status].prob, 0);
    let otherIncomeTotal = 0;
    otherIncome.filter(oi => oi.enabled).forEach(oi => {
      if (oi.type === "one-off" && oi.month === mr.month && oi.year === mr.year) otherIncomeTotal += oi.amount;
      if (oi.type === "monthly") {
        const startK = monthKey(oi.startMonth, oi.startYear);
        if (mr.key >= startK) otherIncomeTotal += oi.amount;
      }
    });

    // Loan cash inflows (new future loans received this month)
    let loanCashIn = 0;
    loanSchedules.forEach((schedule) => { if (schedule[idx]) loanCashIn += schedule[idx].cashIn; });

    const income = (rawShowIncome + otherIncomeTotal) * sc.incMult;

    // ── Costs ──
    const rawFixed = costGroups.filter(g => g.enabled).reduce((s, g) =>
      s + g.items.filter(i => i.enabled).reduce((si, i) => si + i.amount, 0), 0);
    const fixedCosts = rawFixed * sc.costMult;

    let projectCosts = 0;
    projects.filter(p => p.enabled).forEach(p => {
      p.items.forEach(item => {
        if (item.type === "one-off" && item.month === mr.month && item.year === mr.year) projectCosts += item.amount;
        if (item.type === "monthly") {
          const startK = monthKey(item.startMonth, item.startYear);
          if (mr.key >= startK) projectCosts += item.amount;
        }
      });
    });

    // Loan repayments
    let loanInterest = 0, loanCapital = 0, loanPayment = 0;
    loanSchedules.forEach((schedule) => {
      if (schedule[idx]) { loanInterest += schedule[idx].interest; loanCapital += schedule[idx].capital; loanPayment += schedule[idx].payment; }
    });

    // ── VAT ──
    const vatCollected = income * vatSettings.rate;
    const vatOnPurchases = (fixedCosts + projectCosts) * vatSettings.reclaimRate;
    vatAccumulator += vatCollected - vatOnPurchases;
    let vatPayment = 0;
    if (VAT_QUARTER_END_MONTHS.includes(mi)) { vatPending = Math.max(vatAccumulator, 0); vatAccumulator = 0; }
    if (VAT_PAYMENT_MONTHS.includes(mi)) { vatPayment = vatPending + openingVatRemaining; vatPending = 0; openingVatRemaining = 0; }

    // ── Corporation Tax ──
    let ctPayment = 0;
    if (hasCT) {
      // Taxable profit: income - costs - loan interest (NOT capital, NOT VAT, NOT loan cash in)
      fyTaxableProfit += income - fixedCosts - projectCosts - loanInterest;

      // At FY end, calculate CT for completed year
      if (mi === ctSettings.fyEndMonth) {
        if (seenFirstFYEnd) {
          // This is a complete FY — calculate CT
          const ctDue = Math.max(fyTaxableProfit * (ctSettings.rate / 100), 0);
          if (ctDue > 0) {
            ctPendingPayments.push({ amount: ctDue, payMonthIdx: ctPayMonthIdx, paid: false });
          }
        }
        seenFirstFYEnd = true;
        fyTaxableProfit = 0;
      }

      // Pay any CT due this month
      ctPendingPayments.forEach(ct => {
        if (!ct.paid && ct.payMonthIdx === mi) { ctPayment += ct.amount; ct.paid = true; }
      });
      ctPendingPayments = ctPendingPayments.filter(ct => !ct.paid);
    }

    // ── Totals ──
    const totalCosts = fixedCosts + projectCosts + vatPayment + loanPayment + ctPayment;
    balance += income + loanCashIn - totalCosts;

    return {
      ...mr, monthIdx: mi, income, fixedCosts, projectCosts,
      vatPayment, loanPayment, loanInterest, loanCapital, loanCashIn, ctPayment,
      totalCosts, balance,
      showCount: monthShows.length, otherIncome: otherIncomeTotal,
    };
  });
}

function CashflowChart({ data, height = 300, showLegend = true }) {
  return (
    <ResponsiveContainer width="100%" height={height}>
      <ComposedChart data={data} margin={{ top: 5, right: 10, left: 10, bottom: 5 }}>
        <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
        <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
        <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
        {showLegend && <Tooltip content={<ChartTooltip />} />}
        {showLegend && <Legend wrapperStyle={{ fontSize: 11 }} />}
        <Bar dataKey="income" name="Income" fill={C.green} radius={[3, 3, 0, 0]} opacity={0.8} />
        <Bar dataKey="totalCosts" name="Costs" fill={C.red} radius={[3, 3, 0, 0]} opacity={0.6} />
        <Line dataKey="balance" name="Balance" type="monotone" stroke={C.blue} strokeWidth={2.5} dot={false} />
        <ReferenceLine y={0} stroke={C.red} strokeDasharray="4 4" strokeOpacity={0.5} />
      </ComposedChart>
    </ResponsiveContainer>
  );
}

  const w = size === "sm" ? 36 : 44;

  const dot = size === "sm" ? 14 : 18;
  return (
    <div onClick={(e) => { e.stopPropagation(); onChange(!on); }}
      style={{ width: w, height: h, borderRadius: h, backgroundColor: on ? C.green : C.surfaceLight,
        cursor: "pointer", position: "relative", transition: "all 0.2s", flexShrink: 0 }}>
      <div style={{ width: dot, height: dot, borderRadius: "50%", backgroundColor: "#fff",
        position: "absolute", top: (h - dot) / 2, left: on ? w - dot - 3 : 3, transition: "all 0.2s" }} />
    </div>
  );
}

function EditableCell({ value, onChange, prefix = "£", style = {} }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const inputRef = useRef(null);

  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  if (editing) {
    return (
      <input ref={inputRef} value={draft} autoFocus
        onChange={e => setDraft(e.target.value)}
        onBlur={() => { onChange(parseFloat(draft) || 0); setEditing(false); }}
        onKeyDown={e => { if (e.key === "Enter") { onChange(parseFloat(draft) || 0); setEditing(false); } if (e.key === "Escape") setEditing(false); }}
        style={{ background: C.bg, border: `1px solid ${C.accent}`, color: C.text, borderRadius: 4,
          padding: "2px 6px", width: "100%", fontSize: 13, textAlign: "right", outline: "none", ...style }} />
    );
  }
  return (
    <span onClick={() => { setDraft(String(value)); setEditing(true); }}
      style={{ cursor: "pointer", borderBottom: `1px dashed ${C.borderLight}`, padding: "1px 0", ...style }}>
      {prefix}{typeof value === 'number' ? value.toLocaleString() : value}
    </span>
  );
}

// Inline editable text (no prompt() needed)

  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  if (editing) {
    return (
      <input ref={inputRef} value={draft} autoFocus
        onChange={e => setDraft(e.target.value)}
        onBlur={() => { if (draft.trim()) onChange(draft.trim()); setEditing(false); }}

// ─── DASHBOARD ───────────────────────────────────────────
function DashboardPage({ data, openingBalance, scenario, loans, ctSettings }) {
  const sc = SCENARIOS[scenario];
  const totalIncome = data.reduce((s, d) => s + d.income, 0);
  const totalCosts = data.reduce((s, d) => s + d.totalCosts, 0);
  const netCash = totalIncome - totalCosts;
  const endBalance = data.length > 0 ? data[data.length - 1].balance : openingBalance;
  const totalLoanPayments = data.reduce((s, d) => s + (d.loanPayment || 0), 0);
  const totalCTPayments = data.reduce((s, d) => s + (d.ctPayment || 0), 0);
  const lowestBalance = Math.min(...data.map(d => d.balance));
  const lowestMonth = data.find(d => d.balance === lowestBalance);
  const runwayMonths = data.length > 0 ? (() => {
    const avgMonthlyCost = totalCosts / data.length;
    return avgMonthlyCost > 0 ? Math.floor(endBalance / avgMonthlyCost) : 99;
  })() : 0;

  // Quarterly summary
  const quarters = {};
  data.forEach(d => {
    const qi = Math.floor(d.monthIdx / 3) + 1;
    const qk = `Q${qi} ${d.year}`;
    if (!quarters[qk]) quarters[qk] = { income: 0, costs: 0, label: qk };
    quarters[qk].income += d.income;
    quarters[qk].costs += d.totalCosts;
  });
  const quarterData = Object.values(quarters).map(q => ({ ...q, net: q.income - q.costs }));

  return (
    <div>
      {/* KPI Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <KPICard label="Cash In" value={fmtK(totalIncome)} icon="📈"
          subtitle={`${data.length} months, ${sc.label}`} color={C.green} />
        <KPICard label="Cash Out" value={fmtK(totalCosts)} icon="📉" color={C.red}
          subtitle={`Avg ${fmtK(totalCosts / Math.max(data.length, 1))}/mo`} />
        <KPICard label="Net Cash" value={fmtK(netCash)} icon="💰"
          color={netCash >= 0 ? C.green : C.red}
          subtitle={netCash >= 0 ? "Positive cashflow" : "Negative — review costs"} trend={netCash >= 0 ? "up" : "down"} />
        <KPICard label="End Balance" value={fmtK(endBalance)} icon="🏦" color={C.blue}
          subtitle={`Started at ${fmtK(openingBalance)}`} />
        <KPICard label="Runway" value={`${runwayMonths} mo`} icon="⏱️"
          color={runwayMonths > 6 ? C.green : runwayMonths > 3 ? C.accent : C.red}
          subtitle={runwayMonths > 6 ? "Healthy" : "Monitor closely"} />
        <KPICard label="Lowest Point" value={fmtK(lowestBalance)} icon="⚠️"
          color={lowestBalance > 20000 ? C.green : lowestBalance > 0 ? C.accent : C.red}
          subtitle={lowestMonth ? lowestMonth.label : ""} />
        {totalLoanPayments > 0 && <KPICard label="Loan Repayments" value={fmtK(totalLoanPayments)} icon="🏦"
          color={C.textMuted} subtitle={`${(loans || []).filter(l => l.enabled).length} active loan(s)`} />}
        {totalCTPayments > 0 && <KPICard label="Corporation Tax" value={fmtK(totalCTPayments)} icon="🏛️"
          color={C.red} subtitle={`${ctSettings?.rate || 19}% rate`} />}
      </div>

      {/* Main Cashflow Chart */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Cashflow Overview</div>
        <CashflowChart data={data} height={300} showLegend={true} />
      </div>

      {/* Two-column: Quarterly + Seasonal */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Quarterly Bars */}
        <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Quarterly Net Cash</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={quarterData}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
              <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
              <Tooltip content={<ChartTooltip />} />
              <Bar dataKey="net" name="Net" radius={[4, 4, 0, 0]}>
                {quarterData.map((d, i) => (
                  <Cell key={i} fill={d.net >= 0 ? C.green : C.red} opacity={0.8} />
                ))}
              </Bar>
              <ReferenceLine y={0} stroke={C.textDim} strokeDasharray="3 3" />
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Seasonal Heat Map */}
        <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Seasonal Income Pattern</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginTop: 8 }}>
            {data.slice(0, 12).map((d, i) => {
              const intensity = d.income > 0 ? Math.min(d.income / 30000, 1) : 0;
              const bgColor = `rgba(34, 197, 94, ${0.08 + intensity * 0.5})`;
              return (
                <div key={i} style={{ background: bgColor, borderRadius: 6, padding: "8px 6px", textAlign: "center",
                  border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.text }}>{d.month}</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: C.green, margin: "2px 0" }}>{fmtK(d.income)}</div>
                  <div style={{ fontSize: 9, color: C.textMuted }}>{SEASONAL[d.monthIdx]?.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SHOW PIPELINE ───────────────────────────────────────
function PipelinePage({ shows, setShows }) {
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("date");
  const nextId = Math.max(...shows.map(s => s.id), 0) + 1;

  const addShow = () => {
    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    setShows([...shows, { id: nextId, name: "New Show", date: dateStr, month: MONTHS[today.getMonth()], year: today.getFullYear(), fee: 3000, status: "hoped", days: 1 }]);
  };

  const updateShow = (id, field, value) => {
    setShows(shows.map(s => {
      if (s.id !== id) return s;
      if (field === "date") {
        const d = new Date(value + 'T00:00:00');
        return { ...s, date: value, month: MONTHS[d.getMonth()], year: d.getFullYear() };
      }
      if (field === "fee" || field === "days") return { ...s, [field]: parseFloat(value) || 0 };
      return { ...s, [field]: value };
    }));
  };

  const removeShow = (id) => setShows(shows.filter(s => s.id !== id));

  const filtered = shows.filter(s => filter === "all" || s.status === filter);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "date") return (a.date || "").localeCompare(b.date || "");
    if (sortBy === "fee") return b.fee - a.fee;
    return 0;
  });

  const totals = {
    confirmed: shows.filter(s => s.status === "confirmed").reduce((s, sh) => s + sh.fee, 0),
    likely: shows.filter(s => s.status === "likely").reduce((s, sh) => s + sh.fee, 0),
    hoped: shows.filter(s => s.status === "hoped").reduce((s, sh) => s + sh.fee, 0),
  };
  const weighted = totals.confirmed + totals.likely * 0.7 + totals.hoped * 0.4;

  return (
    <div>
      {/* Pipeline Summary Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <KPICard label="Confirmed" value={fmtK(totals.confirmed)} color={C.green} icon="✅"
          subtitle={`${shows.filter(s => s.status === "confirmed").length} shows`} />
        <KPICard label="Likely (70%)" value={fmtK(totals.likely)} color={C.accent} icon="🎯"
          subtitle={`${shows.filter(s => s.status === "likely").length} shows`} />
        <KPICard label="Hoped (40%)" value={fmtK(totals.hoped)} color={C.blue} icon="🤞"
          subtitle={`${shows.filter(s => s.status === "hoped").length} shows`} />
        <KPICard label="Weighted Total" value={fmtK(weighted)} color={C.purple} icon="⚡"
          subtitle="Probability-adjusted" />
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center" }}>
        {["all", "confirmed", "likely", "hoped"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600,
              background: filter === f ? C.accent : C.surfaceLight,
              color: filter === f ? C.bg : C.textMuted }}>
            {f === "all" ? `All (${shows.length})` : `${STATUS_CONFIG[f]?.label} (${shows.filter(s => s.status === f).length})`}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          style={{ background: C.surfaceLight, color: C.text, border: `1px solid ${C.border}`, borderRadius: 6,
            padding: "6px 10px", fontSize: 12 }}>
          <option value="date">Sort by Date</option>
          <option value="fee">Sort by Fee</option>
        </select>
        <button onClick={addShow}
          style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer",
            background: C.green, color: "#fff", fontSize: 12, fontWeight: 700 }}>
          + Add Show
        </button>
      </div>

      {/* Show Table */}
      <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {["Show", "Date", "Days", "Fee", "Status", "Weighted", ""].map((h, i) => (
                <th key={i} style={{ padding: "10px 12px", textAlign: i >= 2 ? "right" : "left",
                  fontSize: 10, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map(show => (
              <tr key={show.id} style={{ borderBottom: `1px solid ${C.border}22` }}
                onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <td style={{ padding: "8px 12px" }}>
                  <EditableText value={show.name} onChange={v => updateShow(show.id, "name", v)}
                    style={{ fontSize: 13, fontWeight: 600, color: C.text }} />
                </td>
                <td style={{ padding: "8px 12px" }}>
                  <input type="date" value={show.date || ""} onChange={e => updateShow(show.id, "date", e.target.value)}
                    style={{ background: C.bg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 4, padding: "3px 6px", fontSize: 12,
                      colorScheme: "dark", cursor: "pointer" }} />
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right" }}>
                  <EditableCell value={show.days} prefix="" onChange={v => updateShow(show.id, "days", v)} />
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right", fontWeight: 700, color: C.green }}>

    ...g, items: g.items.map(i => i.id === iid ? { ...i, enabled: !i.enabled } : i)

// ─── VAT & TAX ───────────────────────────────────────────
function VATPage({ data, vatSettings, ctSettings }) {
  // Calculate quarterly VAT using UK quarters (Jan-Mar, Apr-Jun, Jul-Sep, Oct-Dec)
  const vatQuarters = {};
  data.forEach(d => {
    const qi = Math.floor(d.monthIdx / 3) + 1;
    const qk = `Q${qi} ${d.year}`;
    if (!vatQuarters[qk]) vatQuarters[qk] = { income: 0, fixedCosts: 0, projectCosts: 0, label: qk, months: [], endMonthIdx: -1 };
    vatQuarters[qk].income += d.income;
    vatQuarters[qk].fixedCosts += d.fixedCosts;
    vatQuarters[qk].projectCosts += d.projectCosts;
    vatQuarters[qk].months.push(d.label);
    if (d.monthIdx > vatQuarters[qk].endMonthIdx) vatQuarters[qk].endMonthIdx = d.monthIdx;
  });

  const vatData = Object.values(vatQuarters).map(q => {
    const vatOnSales = q.income * vatSettings.rate;
    const vatOnPurchases = (q.fixedCosts + q.projectCosts) * vatSettings.reclaimRate;
    const vatDue = vatOnSales - vatOnPurchases;
    const paymentLabel = VAT_PAYMENT_LABELS[q.endMonthIdx] || "—";
    return { ...q, vatOnSales, vatOnPurchases, vatDue, paymentLabel };
  });

  const totalVatDue = vatData.reduce((s, q) => s + q.vatDue, 0);

  return (
    <div>
      {/* VAT Settings */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16,
        border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>UK VAT Settings</div>

    <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "auto" }}>

                <td style={{ padding: "8px 12px", textAlign: "right", color: C.purple }}>{d.vatPayment > 0 ? fmt(d.vatPayment) : "—"}</td>

// ─── SCENARIOS ───────────────────────────────────────────
function ScenariosPage({ shows, costGroups, projects, otherIncome, openingBalance, monthRange, vatSettings, loans, ctSettings, openingBalances }) {
  const scenarioResults = {};
  Object.keys(SCENARIOS).forEach(key => {
    scenarioResults[key] = calculateCashflow({
      shows, costGroups, projects, otherIncome, openingBalance, scenario: key, monthRange, vatSettings,
      loans, ctSettings, openingBalances
    });
  });

  // Combine for chart
  const chartData = monthRange.map((mr, i) => ({
    label: mr.label,
    expected: scenarioResults.expected[i]?.balance || 0,
    optimistic: scenarioResults.optimistic[i]?.balance || 0,
    pessimistic: scenarioResults.pessimistic[i]?.balance || 0,
  }));

  return (
    <div>
      {/* Scenario Comparison Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        {Object.entries(SCENARIOS).map(([key, sc]) => {
          const results = scenarioResults[key];
          const lastBalance = results[results.length - 1]?.balance || 0;
          const totalIncome = results.reduce((s, d) => s + d.income, 0);
          const lowest = Math.min(...results.map(d => d.balance));
          return (
            <div key={key} style={{ flex: 1, background: C.surface, borderRadius: 10, padding: 16,
              border: `2px solid ${sc.color}44` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", backgroundColor: sc.color }} />
                <span style={{ fontSize: 14, fontWeight: 700, color: sc.color }}>{sc.label}</span>
              </div>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>End Balance</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: lastBalance >= 0 ? sc.color : C.red }}>{fmtK(lastBalance)}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>
                Income: {fmtK(totalIncome)} · Lowest: {fmtK(lowest)}
              </div>
              <div style={{ fontSize: 10, color: C.textDim, marginTop: 4 }}>
                Income {sc.incMult > 1 ? "+" : ""}{((sc.incMult - 1) * 100).toFixed(0)}% ·
                Costs {sc.costMult > 1 ? "+" : ""}{((sc.costMult - 1) * 100).toFixed(0)}%
              </div>
            </div>
          );
        })}
      </div>

      {/* Scenario Chart */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Balance Projection — All Scenarios</div>
        <ResponsiveContainer width="100%" height={350}>
          <ComposedChart data={chartData} margin={{ top: 5, right: 10, left: 10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
            <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
            <Tooltip content={<ChartTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <Area dataKey="optimistic" name="Optimistic" type="monotone"
              fill={C.green} fillOpacity={0.1} stroke={C.green} strokeWidth={2} strokeDasharray="6 3" />
            <Area dataKey="pessimistic" name="Pessimistic" type="monotone"
              fill={C.red} fillOpacity={0.1} stroke={C.red} strokeWidth={2} strokeDasharray="6 3" />
            <Line dataKey="expected" name="Expected" type="monotone"
              stroke={C.blue} strokeWidth={3} dot={false} />
            <ReferenceLine y={0} stroke={C.red} strokeDasharray="4 4" strokeOpacity={0.6} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ─── LOANS PAGE ─────────────────────────────────────────
function LoansPage({ loans, setLoans, monthRange }) {
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const addLoan = (isFuture) => {
    const newLoan = {
      id: "loan_" + Date.now(),
      name: isFuture ? "New Future Loan" : "New Loan",
      outstandingBalance: 0,
      annualRate: 5.0,
      remainingMonths: 60,
      startDate: isFuture ? { month: monthRange[3]?.month || "Apr", year: monthRange[3]?.year || 2026 } : null,
      enabled: true,
    };
    setLoans([...loans, newLoan]);
  };

  const updateLoan = (id, field, value) => {
    setLoans(loans.map(l => l.id === id ? { ...l, [field]: value } : l));
  };

  const deleteLoan = (id) => {
    setLoans(loans.filter(l => l.id !== id));
  };

  const enabledLoans = loans.filter(l => l.enabled);
  const totalOutstanding = enabledLoans.reduce((s, l) => s + l.outstandingBalance, 0);
  const totalMonthlyPayments = enabledLoans.reduce((s, l) => s + calcMonthlyPayment(l.outstandingBalance, l.annualRate, l.remainingMonths), 0);

  // Calculate totals across the forecast for enabled loans
  const schedules = enabledLoans.map(l => buildLoanSchedule(l, monthRange));
  const totalInterest = schedules.reduce((s, sch) => s + sch.reduce((si, m) => si + m.interest, 0), 0);
  const totalCapital = schedules.reduce((s, sch) => s + sch.reduce((si, m) => si + m.capital, 0), 0);

  return (
    <div>
      {/* KPI Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <KPICard label="Total Outstanding" value={fmtK(totalOutstanding)} icon="🏦" color={C.blue}
          subtitle={`${enabledLoans.length} active loan(s)`} />
        <KPICard label="Monthly Repayments" value={fmt(Math.round(totalMonthlyPayments))} icon="📅" color={C.red}
          subtitle="Combined payments" />
        <KPICard label="Total Interest" value={fmtK(totalInterest)} icon="📈" color={C.orange}
          subtitle="Over forecast period" />
        <KPICard label="Capital Repaid" value={fmtK(totalCapital)} icon="✅" color={C.green}
          subtitle="Over forecast period" />
      </div>

      {/* Loans Table */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}`, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>Loan Schedule</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => addLoan(false)}
              style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px",
                fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ Add Existing Loan</button>
            <button onClick={() => addLoan(true)}
              style={{ background: C.green, color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px",
                fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ Add Future Loan</button>
          </div>
        </div>

        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: `2px solid ${C.border}` }}>
              {["Name", "Balance", "Rate %", "Months Left", "Monthly Payment", "Start", "Enabled", ""].map((h, i) => (
                <th key={i} style={{ padding: "8px 12px", textAlign: i === 0 ? "left" : i === 7 ? "center" : "right",
                  fontSize: 10, fontWeight: 700, color: C.textDim, textTransform: "uppercase" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {loans.map(loan => {
              const monthlyPmt = calcMonthlyPayment(loan.outstandingBalance, loan.annualRate, loan.remainingMonths);
              return (
                <tr key={loan.id} style={{ borderBottom: `1px solid ${C.border}22`, opacity: loan.enabled ? 1 : 0.5 }}>
                  <td style={{ padding: "8px 12px" }}>
                    <EditableText value={loan.name} onChange={v => updateLoan(loan.id, "name", v)} />
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right" }}>
                    <EditableCell value={loan.outstandingBalance} onChange={v => updateLoan(loan.id, "outstandingBalance", v)} />
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right" }}>
                    <input type="number" step="0.1" value={loan.annualRate}
                      onChange={e => updateLoan(loan.id, "annualRate", parseFloat(e.target.value) || 0)}
                      style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 4,
                        padding: "4px 8px", width: 60, textAlign: "right", color: C.text, fontSize: 13 }} />
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right" }}>
                    <input type="number" value={loan.remainingMonths}
                      onChange={e => updateLoan(loan.id, "remainingMonths", parseInt(e.target.value) || 0)}
                      style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 4,
                        padding: "4px 8px", width: 60, textAlign: "right", color: C.text, fontSize: 13 }} />
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right", color: C.textMuted, fontSize: 13, fontWeight: 600 }}>
                    {fmt(Math.round(monthlyPmt))}
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right", fontSize: 12 }}>
                    {loan.startDate ? (
                      <span style={{ color: C.green }}>{loan.startDate.month} {loan.startDate.year}</span>
                    ) : (
                      <span style={{ color: C.textDim }}>Existing</span>
                    )}
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "right" }}>
                    <input type="checkbox" checked={loan.enabled}
                      onChange={e => updateLoan(loan.id, "enabled", e.target.checked)} />
                  </td>
                  <td style={{ padding: "8px 12px", textAlign: "center" }}>
                    <button onClick={() => deleteLoan(loan.id)}
                      style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 14 }}>✕</button>
                  </td>
                </tr>
              );
            })}
            {loans.length === 0 && (
              <tr><td colSpan={8} style={{ padding: 20, textAlign: "center", color: C.textDim, fontSize: 13 }}>
                No loans added yet. Click "+ Add Existing Loan" or "+ Add Future Loan" to get started.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Info */}
      <div style={{ background: C.surfaceLight, borderRadius: 8, padding: 14, fontSize: 11, color: C.textMuted,
        border: `1px solid ${C.border}` }}>
        <strong>How loans work:</strong> Existing loans begin repaying immediately. Future loans inject cash on their start date,
        then repayments begin. Interest is calculated monthly on the reducing balance. Loan interest is tax-deductible for
        Corporation Tax; capital repayments are not.
      </div>
    </div>
  );
}

  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const addBankAccount = () => {
    setOpeningBalances({
      ...openingBalances,
      bankAccounts: [...openingBalances.bankAccounts, { id: "ba_" + Date.now(), name: "New Account", amount: 0 }]
    });
  };

  const updateBankAccount = (id, field, value) => {
    setOpeningBalances({
      ...openingBalances,
      bankAccounts: openingBalances.bankAccounts.map(ba => ba.id === id ? { ...ba, [field]: value } : ba)
    });
  };

  const deleteBankAccount = (id) => {
    if (openingBalances.bankAccounts.length <= 1) return; // Keep at least one
    setOpeningBalances({
      ...openingBalances,
      bankAccounts: openingBalances.bankAccounts.filter(ba => ba.id !== id)
    });
  };

  const totalCash = openingBalances.bankAccounts.reduce((s, ba) => s + (ba.amount || 0), 0);

  const updateOpeningCT = (id, field, value) => {
    setOpeningBalances({
      ...openingBalances,
      openingCT: openingBalances.openingCT.map(ct => ct.id === id ? { ...ct, [field]: value } : ct)
    });
  };

  // Recompute opening CT rows when plan start date or FY end changes
  useEffect(() => {
    const fyEnd = ctSettings.fyEndMonth;
    const lastFYEndYear = planStartMonth <= fyEnd ? planStartYear - 1 : planStartYear;

    // Partial period: from month after last FY end to month before plan start
    const pStartMonth = (fyEnd + 1) % 12;
    const pStartYear = fyEnd === 11 ? lastFYEndYear + 1 : lastFYEndYear;
    const pEndMonth = (planStartMonth - 1 + 12) % 12;
    const pEndYear = planStartMonth === 0 ? planStartYear - 1 : planStartYear;
    const hasPartial = !(pStartMonth === planStartMonth && pStartYear === planStartYear);

    const newCT = [
      { id: "ct_1", label: `CT from FY ending ${MONTH_NAMES[fyEnd]} ${lastFYEndYear}`,
        amount: openingBalances.openingCT.find(c => c.id === "ct_1")?.amount || 0, fyEndMonth: fyEnd }
    ];
    if (hasPartial) {
      newCT.push({ id: "ct_2", label: `CT from partial year ${MONTH_NAMES[pStartMonth]}-${MONTH_NAMES[pEndMonth]} ${pEndYear}`,
        amount: openingBalances.openingCT.find(c => c.id === "ct_2")?.amount || 0, fyEndMonth: pEndMonth });
    }

    // Only update if structure changed (avoid infinite loop)
    const oldStructure = JSON.stringify(openingBalances.openingCT.map(({ amount, ...rest }) => rest));
    const newStructure = JSON.stringify(newCT.map(({ amount, ...rest }) => rest));
    if (oldStructure !== newStructure) {
      setOpeningBalances(prev => ({ ...prev, openingCT: newCT }));
    }
  }, [planStartMonth, planStartYear, ctSettings.fyEndMonth]);

  return (
    <div>

      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4 }}>Plan Start Date</div>
        <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 12 }}>
          Your forecast starts from this month. Set it to the current month and update your opening balances to match today's figures.
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <select value={planStartMonth}
            onChange={e => setPlanStartMonth(parseInt(e.target.value))}
            style={{ background: C.surfaceLight, border: `1px solid ${C.border}`, borderRadius: 6,
              padding: "8px 12px", color: C.text, fontSize: 14, fontWeight: 600 }}>
            {MONTH_NAMES.map((m, i) => <option key={i} value={i}>{m}</option>)}
          </select>
          <input type="number" value={planStartYear}
            onChange={e => setPlanStartYear(parseInt(e.target.value) || new Date().getFullYear())}
            style={{ background: C.surfaceLight, border: `1px solid ${C.border}`, borderRadius: 6,
              padding: "8px 12px", width: 100, color: C.text, fontSize: 14, fontWeight: 600 }} />
        </div>
      </div>

      {/* Bank Accounts */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>Opening Bank Balances</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>These make up your starting cash position</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.accent }}>{fmt(totalCash)}</div>
            <button onClick={addBankAccount}
              style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px",
                fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ Add Account</button>
          </div>
        </div>

        {openingBalances.bankAccounts.map(ba => (
          <div key={ba.id} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8,
            padding: "8px 12px", background: C.surfaceLight, borderRadius: 6, border: `1px solid ${C.border}22` }}>
            <div style={{ flex: 1 }}>
              <EditableText value={ba.name} onChange={v => updateBankAccount(ba.id, "name", v)} />
            </div>
            <div style={{ width: 140 }}>
              <EditableCell value={ba.amount} onChange={v => updateBankAccount(ba.id, "amount", v)} />
            </div>
            {openingBalances.bankAccounts.length > 1 && (
              <button onClick={() => deleteBankAccount(ba.id)}
                style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 14 }}>✕</button>
            )}
          </div>
        ))}
      </div>

      {/* Corporation Tax Settings */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>Corporation Tax</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>CT Rate (%)</div>
            <input type="number" step="1" value={ctSettings.rate}
              onChange={e => setCtSettings({ ...ctSettings, rate: parseFloat(e.target.value) || 0 })}
              style={{ background: C.surfaceLight, border: `1px solid ${C.border}`, borderRadius: 6,
                padding: "8px 12px", width: "100%", color: C.text, fontSize: 14, fontWeight: 600 }} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>Financial Year End</div>
            <select value={ctSettings.fyEndMonth}
              onChange={e => setCtSettings({ ...ctSettings, fyEndMonth: parseInt(e.target.value) })}
              style={{ background: C.surfaceLight, border: `1px solid ${C.border}`, borderRadius: 6,
                padding: "8px 12px", width: "100%", color: C.text, fontSize: 14, fontWeight: 600 }}>
              {MONTH_NAMES.map((m, i) => <option key={i} value={i}>{m}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>Payment Due</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text, padding: "8px 0" }}>
              {MONTH_NAMES[calcCTPaymentMonth(ctSettings.fyEndMonth)]} <span style={{ fontSize: 11, color: C.textDim }}>(9 months + 1 day after FY end)</span>
            </div>
          </div>
        </div>
      </div>

      {/* Opening VAT Owed */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4 }}>Opening VAT Owed</div>
        <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 12 }}>
          VAT owed from the quarter before your plan start. This will be included in the first VAT payment month.
        </div>
        <div style={{ width: 200 }}>
          <EditableCell value={openingBalances.openingVatOwed || 0}
            onChange={v => setOpeningBalances({ ...openingBalances, openingVatOwed: v })} />
        </div>
      </div>

      {/* Opening Corporation Tax */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4 }}>Opening Corporation Tax</div>
        <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 12 }}>
          CT owed from financial years before your plan start. Enter amounts from your accounts. Each will be paid in the auto-calculated payment month.
        </div>

        {openingBalances.openingCT.map(ct => (
          <div key={ct.id} style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 8,
            padding: "10px 14px", background: C.surfaceLight, borderRadius: 6, border: `1px solid ${C.border}22` }}>
            <div style={{ flex: 1, fontSize: 13, color: C.text }}>{ct.label}</div>
            <div style={{ width: 140 }}>
              <EditableCell value={ct.amount} onChange={v => updateOpeningCT(ct.id, "amount", v)} />
            </div>
            <div style={{ fontSize: 11, color: C.textDim, width: 120, textAlign: "right" }}>
              Pays in {MONTH_NAMES[calcCTPaymentMonth(ct.fyEndMonth)]}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

    const API = {
      async checkAuth() {
        try {
          const r = await fetch('/api/auth.php');
          const d = await r.json();
          return d.authenticated === true;
        } catch { return false; }
      },
      async login(username, password) {
        const r = await fetch('/api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        return r.ok;
      },
      async loadData() {
        try {
          const r = await fetch('/api/api.php');
          if (!r.ok) return null;
          const d = await r.json();
          return d.success && d.data && !d.data._initialized ? d.data : null;
        } catch { return null; }
      },
      async saveData(data) {
        const r = await fetch('/api/api.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data })
        });
        return r.ok;
      }
    };

    // ═══════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════

      const [username, setUsername] = useState('');

      const [error, setError] = useState('');

    function SaveIndicator({ status }) {
      const colors = { idle: '#64748b', saving: '#f59e0b', saved: '#22c55e', error: '#ef4444' };
      const labels = { idle: '', saving: 'Saving...', saved: 'Saved', error: 'Save failed' };
      if (status === 'idle') return null;
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 12px',
          fontSize: 10, color: colors[status], fontWeight: 600 }}>

            border: '2px solid #f59e0b', borderTopColor: 'transparent', borderRadius: '50%',
            animation: 'spin 0.6s linear infinite' }} />}
          {status === 'saved' && '✓'}
          {status === 'error' && '✕'}
          {labels[status]}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    // SAVE-AWARE WRAPPER
    // ═══════════════════════════════════════════════════════════
    function SparkCashflowWithSave() {
      const loaded = window.__SPARK_INITIAL_DATA || null;

      // Migrate opening balance: if old save has openingBalance number but no openingBalances object,
      // create openingBalances from the old number
      const migrateOpeningBalances = (loaded) => {
        if (loaded?.openingBalances) return loaded.openingBalances;
        if (loaded?.openingBalance != null) {
          return {
            ...DEFAULT_OPENING_BALANCES,
            bankAccounts: [{ id: "ba_1", name: "Main Account", amount: loaded.openingBalance }],
          };
        }
        return DEFAULT_OPENING_BALANCES;
      };

      const [page, setPage] = useState("dashboard");
      const [scenario, setScenario] = useState("expected");
      const [timeframe, setTimeframe] = useState(loaded?.timeframe || 12);
      const [shows, setShows] = useState(migrateShowDates(loaded?.shows || DEFAULT_SHOWS));
      const [costGroups, setCostGroups] = useState(loaded?.costGroups || DEFAULT_COST_GROUPS);
      const [projects, setProjects] = useState(loaded?.projects || DEFAULT_PROJECTS);
      const [otherIncome, setOtherIncome] = useState(loaded?.otherIncome || DEFAULT_OTHER_INCOME);
      const [vatSettings] = useState({ rate: 0.20, reclaimRate: 0.20, paymentDelay: 1 });
      const [loans, setLoans] = useState(loaded?.loans || DEFAULT_LOANS);
      const [ctSettings, setCtSettings] = useState(loaded?.ctSettings || DEFAULT_CT_SETTINGS);
      const [openingBalances, setOpeningBalances] = useState(() => migrateOpeningBalances(loaded));
      const [planStartMonth, setPlanStartMonth] = useState(loaded?.planStartMonth ?? new Date().getMonth());
      const [planStartYear, setPlanStartYear] = useState(loaded?.planStartYear ?? new Date().getFullYear());
      const [saveStatus, setSaveStatus] = useState('idle');

      // Effective opening balance = sum of bank accounts
      const openingBalance = useMemo(() =>
        openingBalances.bankAccounts.reduce((sum, ba) => sum + (ba.amount || 0), 0),
        [openingBalances.bankAccounts]
      );

      // Auto-save with debounce
      const saveTimer = useRef(null);
      const isFirstRender = useRef(true);

      useEffect(() => {
        if (isFirstRender.current) { isFirstRender.current = false; return; }
        if (saveTimer.current) clearTimeout(saveTimer.current);
        setSaveStatus('saving');
        saveTimer.current = setTimeout(async () => {
          const ok = await API.saveData({
            openingBalance, shows, costGroups, projects, otherIncome, vatSettings, timeframe,
            loans, ctSettings, openingBalances, planStartMonth, planStartYear,
            savedAt: new Date().toISOString()
          });
          setSaveStatus(ok ? 'saved' : 'error');
          if (ok) setTimeout(() => setSaveStatus('idle'), 2000);
        }, 2000);
        return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
      }, [openingBalance, shows, costGroups, projects, otherIncome, vatSettings, timeframe, loans, ctSettings, openingBalances, planStartMonth, planStartYear]);

      // Generate month range
      const monthRange = useMemo(() => generateMonthRange(planStartYear, planStartMonth, timeframe), [planStartYear, planStartMonth, timeframe]);

      // Core calculation
      const data = useMemo(() => calculateCashflow({

        loans, ctSettings, openingBalances
      }), [shows, costGroups, projects, otherIncome, openingBalance, scenario, monthRange, vatSettings, loans, ctSettings, openingBalances]);

              {Object.entries(SCENARIOS).map(([key, sc]) => (

              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div onClick={() => setPage("settings")} style={{ background: C.surface, borderRadius: 8, padding: "8px 14px",
                  border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}
                  title="Click to edit in Settings">
                  <span style={{ fontSize: 11, color: C.textMuted }}>Opening Balance</span>
                  <span style={{ fontSize: 15, fontWeight: 800, color: C.accent }}>{fmt(openingBalance)}</span>
                </div>
              </div>
            </div>

            {/* Always-on chart for data pages */}
            {["pipeline","other_income","costs","projects"].includes(page) && (
              <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Cashflow Overview</div>
                <CashflowChart data={data} height={300} showLegend={true} />
              </div>
            )}

            {page === "dashboard" && <DashboardPage data={data} openingBalance={openingBalance} scenario={scenario} loans={loans} ctSettings={ctSettings} />}
            {page === "pipeline" && <PipelinePage shows={shows} setShows={setShows} />}
            {page === "other_income" && <OtherIncomePage otherIncome={otherIncome} setOtherIncome={setOtherIncome} planStartMonth={planStartMonth} planStartYear={planStartYear} />}
            {page === "costs" && <CostsPage costGroups={costGroups} setCostGroups={setCostGroups} />}
            {page === "projects" && <ProjectsPage projects={projects} setProjects={setProjects} planStartMonth={planStartMonth} planStartYear={planStartYear} />}
            {page === "loans" && <LoansPage loans={loans} setLoans={setLoans} monthRange={monthRange} />}
            {page === "vat" && <VATPage data={data} vatSettings={vatSettings} ctSettings={ctSettings} />}
            {page === "monthly" && <MonthlyDetailPage data={data} />}
            {page === "scenarios" && <ScenariosPage shows={shows} costGroups={costGroups} projects={projects}
              otherIncome={otherIncome} openingBalance={openingBalance} monthRange={monthRange} vatSettings={vatSettings}
              loans={loans} ctSettings={ctSettings} openingBalances={openingBalances} />}
            {page === "settings" && <SettingsPage openingBalances={openingBalances} setOpeningBalances={setOpeningBalances}
              ctSettings={ctSettings} setCtSettings={setCtSettings} vatSettings={vatSettings}
              planStartMonth={planStartMonth} setPlanStartMonth={setPlanStartMonth}
              planStartYear={planStartYear} setPlanStartYear={setPlanStartYear} />}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    // APP WRAPPER (Auth + Loading)
    // ═══════════════════════════════════════════════════════════
    function AppWrapper() {
      const [authState, setAuthState] = useState('checking'); // checking, login, ready

      useEffect(() => {
        API.checkAuth().then(authed => {
          if (authed) {
            API.loadData().then(data => {
              if (data) {
                window.__SPARK_INITIAL_DATA = data;
              }
              setAuthState('ready');
            });
          } else {
            setAuthState('login');
          }
        });
      }, []);

      const handleLogin = () => {
        API.loadData().then(data => {
          if (data) {
            window.__SPARK_INITIAL_DATA = data;
          }
          setAuthState('ready');
        });
      };

      if (authState === 'checking') {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh',
            background: '#0f172a', color: '#94a3b8', fontSize: 14 }}>
            <span style={{ display: 'inline-block', width: 16, height: 16, border: '2px solid #f59e0b',
              borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.6s linear infinite',
              marginRight: 8 }} /> Loading...
          </div>
        );
      }

      if (authState === 'login') {
        return <LoginScreen onLogin={handleLogin} />;
      }

      return <SparkCashflowWithSave />;
    }

    // ═══════════════════════════════════════════════════════════
    // MOUNT
    // ═══════════════════════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWrapper />);
  </script>
</body>
</html>
