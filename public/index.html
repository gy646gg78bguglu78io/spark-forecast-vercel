// ─── Utility Functions ───────────────────────────────────
const fmt = (n) => {
  if (n === undefined || n === null) return "£0";
  const abs = Math.abs(n);
  if (abs >= 1000) return (n < 0 ? "-" : "") + "£" + abs.toLocaleString("en-GB", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (n < 0 ? "-" : "") + "£" + abs.toFixed(0);
};

const fmtK = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1000) return (n < 0 ? "-" : "") + "£" + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
  return fmt(n);
};

const monthIndex = (m) => MONTHS.indexOf(m);
const monthKey = (m, y) => `${y}-${String(MONTHS.indexOf(m) + 1).padStart(2, "0")}`;

function generateMonthRange(startYear, startMonth, count) {
  const result = [];
  let y = startYear, m = startMonth;
  for (let i = 0; i < count; i++) {
    result.push({ month: MONTHS[m], year: y, key: `${y}-${String(m + 1).padStart(2, "0")}`, label: `${MONTHS[m]} ${y}` });
    m++;
    if (m >= 12) { m = 0; y++; }
  }
  return result;
}

function Toggle({ on, onChange, size = "sm" }) {
  const w = size === "sm" ? 36 : 44;
  const h = size === "sm" ? 20 : 24;
  const dot = size === "sm" ? 14 : 18;
  return (
    <div onClick={(e) => { e.stopPropagation(); onChange(!on); }}
      style={{ width: w, height: h, borderRadius: h, backgroundColor: on ? C.green : C.surfaceLight,
        cursor: "pointer", position: "relative", transition: "all 0.2s", flexShrink: 0 }}>
      <div style={{ width: dot, height: dot, borderRadius: "50%", backgroundColor: "#fff",
        position: "absolute", top: (h - dot) / 2, left: on ? w - dot - 3 : 3, transition: "all 0.2s" }} />
    </div>
  );
}

function EditableCell({ value, onChange, prefix = "£", style = {} }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const inputRef = useRef(null);

  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  if (editing) {
    return (
      <input ref={inputRef} value={draft} autoFocus
        onChange={e => setDraft(e.target.value)}
        onBlur={() => { onChange(parseFloat(draft) || 0); setEditing(false); }}
        onKeyDown={e => { if (e.key === "Enter") { onChange(parseFloat(draft) || 0); setEditing(false); } if (e.key === "Escape") setEditing(false); }}
        style={{ background: C.bg, border: `1px solid ${C.accent}`, color: C.text, borderRadius: 4,
          padding: "2px 6px", width: "100%", fontSize: 13, textAlign: "right", outline: "none", ...style }} />
    );
  }
  return (
    <span onClick={() => { setDraft(String(value)); setEditing(true); }}
      style={{ cursor: "pointer", borderBottom: `1px dashed ${C.borderLight}`, padding: "1px 0", ...style }}>
      {prefix}{typeof value === 'number' ? value.toLocaleString() : value}
    </span>
  );
}

// Inline editable text (no prompt() needed)
function EditableText({ value, onChange, style = {} }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const inputRef = useRef(null);

  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  if (editing) {
    return (
      <input ref={inputRef} value={draft} autoFocus
        onChange={e => setDraft(e.target.value)}
        onBlur={() => { if (draft.trim()) onChange(draft.trim()); setEditing(false); }}
        onKeyDown={e => { if (e.key === "Enter") { if (draft.trim()) onChange(draft.trim()); setEditing(false); } if (e.key === "Escape") { setDraft(value); setEditing(false); } }}
        style={{ background: C.bg, border: `1px solid ${C.accent}`, color: C.text, borderRadius: 4,
          padding: "2px 6px", fontSize: 13, outline: "none", minWidth: 80, ...style }} />
    );
  }
  return (
    <span onClick={() => { setDraft(value); setEditing(true); }}
      style={{ cursor: "pointer", borderBottom: `1px dashed ${C.borderLight}`, padding: "1px 0", ...style }}>
      {value}
    </span>
  );
}

            onMouseLeave={e => { if (active !== item.id) e.currentTarget.style.background = "transparent"; }}>
            <span style={{ fontSize: 16 }}>{item.icon}</span>
            <span>{item.label}</span>
          </div>
        ))}
      </div>

      {/* Scenario Selector */}
      <div style={{ padding: "12px", borderTop: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 10, color: C.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Scenario</div>
        {Object.entries(SCENARIOS).map(([key, sc]) => (
          <div key={key} onClick={() => onScenario(key)}
            style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", borderRadius: 6,
              cursor: "pointer", marginBottom: 2, fontSize: 12,
              background: scenario === key ? `${sc.color}22` : "transparent",
              color: scenario === key ? sc.color : C.textMuted,
              fontWeight: scenario === key ? 700 : 500 }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: sc.color, opacity: scenario === key ? 1 : 0.4 }} />
            {sc.label}
          </div>
        ))}
      </div>

      {/* Timeframe */}
      <div style={{ padding: "0 12px 16px" }}>
        <div style={{ fontSize: 10, color: C.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Timeframe</div>
        <div style={{ display: "flex", gap: 4 }}>
          {[6, 12, 24].map(t => (
            <button key={t} onClick={() => onTimeframe(t)}
              style={{ flex: 1, padding: "5px 0", borderRadius: 5, border: "none", cursor: "pointer",
                fontSize: 11, fontWeight: 700,
                background: timeframe === t ? C.accent : C.surfaceLight,
                color: timeframe === t ? C.bg : C.textMuted }}>
              {t}m
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────
function DashboardPage({ data, openingBalance, scenario }) {
  const sc = SCENARIOS[scenario];
  const totalIncome = data.reduce((s, d) => s + d.income, 0);
  const totalCosts = data.reduce((s, d) => s + d.totalCosts, 0);
  const netCash = totalIncome - totalCosts;
  const endBalance = data.length > 0 ? data[data.length - 1].balance : openingBalance;
  const lowestBalance = Math.min(...data.map(d => d.balance));
  const lowestMonth = data.find(d => d.balance === lowestBalance);
  const runwayMonths = data.length > 0 ? (() => {
    const avgMonthlyCost = totalCosts / data.length;
    return avgMonthlyCost > 0 ? Math.floor(endBalance / avgMonthlyCost) : 99;
  })() : 0;

  // Quarterly summary
  const quarters = {};
  data.forEach(d => {
    const qi = Math.floor(d.monthIdx / 3) + 1;
    const qk = `Q${qi} ${d.year}`;
    if (!quarters[qk]) quarters[qk] = { income: 0, costs: 0, label: qk };
    quarters[qk].income += d.income;
    quarters[qk].costs += d.totalCosts;
  });
  const quarterData = Object.values(quarters).map(q => ({ ...q, net: q.income - q.costs }));

  return (
    <div>
      {/* KPI Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <KPICard label="Cash In" value={fmtK(totalIncome)} icon="📈"
          subtitle={`${data.length} months, ${sc.label}`} color={C.green} />
        <KPICard label="Cash Out" value={fmtK(totalCosts)} icon="📉" color={C.red}
          subtitle={`Avg ${fmtK(totalCosts / Math.max(data.length, 1))}/mo`} />
        <KPICard label="Net Cash" value={fmtK(netCash)} icon="💰"
          color={netCash >= 0 ? C.green : C.red}
          subtitle={netCash >= 0 ? "Positive cashflow" : "Negative — review costs"} trend={netCash >= 0 ? "up" : "down"} />
        <KPICard label="End Balance" value={fmtK(endBalance)} icon="🏦" color={C.blue}
          subtitle={`Started at ${fmtK(openingBalance)}`} />
        <KPICard label="Runway" value={`${runwayMonths} mo`} icon="⏱️"
          color={runwayMonths > 6 ? C.green : runwayMonths > 3 ? C.accent : C.red}
          subtitle={runwayMonths > 6 ? "Healthy" : "Monitor closely"} />
        <KPICard label="Lowest Point" value={fmtK(lowestBalance)} icon="⚠️"
          color={lowestBalance > 20000 ? C.green : lowestBalance > 0 ? C.accent : C.red}
          subtitle={lowestMonth ? lowestMonth.label : ""} />
      </div>

      {/* Main Cashflow Chart */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Cashflow Overview</div>
        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={data} margin={{ top: 5, right: 10, left: 10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
            <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
            <Tooltip content={<ChartTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <Bar dataKey="income" name="Income" fill={C.green} radius={[3, 3, 0, 0]} opacity={0.8} />
            <Bar dataKey="totalCosts" name="Costs" fill={C.red} radius={[3, 3, 0, 0]} opacity={0.6} />
            <Line dataKey="balance" name="Balance" type="monotone" stroke={C.blue} strokeWidth={2.5} dot={false} />
            <ReferenceLine y={0} stroke={C.red} strokeDasharray="4 4" strokeOpacity={0.5} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>

      {/* Two-column: Quarterly + Seasonal */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Quarterly Bars */}
        <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Quarterly Net Cash</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={quarterData}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
              <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
              <Tooltip content={<ChartTooltip />} />
              <Bar dataKey="net" name="Net" radius={[4, 4, 0, 0]}>
                {quarterData.map((d, i) => (
                  <Cell key={i} fill={d.net >= 0 ? C.green : C.red} opacity={0.8} />
                ))}
              </Bar>
              <ReferenceLine y={0} stroke={C.textDim} strokeDasharray="3 3" />
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Seasonal Heat Map */}
        <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Seasonal Income Pattern</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginTop: 8 }}>
            {data.slice(0, 12).map((d, i) => {
              const intensity = d.income > 0 ? Math.min(d.income / 30000, 1) : 0;
              const bgColor = `rgba(34, 197, 94, ${0.08 + intensity * 0.5})`;
              return (
                <div key={i} style={{ background: bgColor, borderRadius: 6, padding: "8px 6px", textAlign: "center",
                  border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.text }}>{d.month}</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: C.green, margin: "2px 0" }}>{fmtK(d.income)}</div>
                  <div style={{ fontSize: 9, color: C.textMuted }}>{SEASONAL[d.monthIdx]?.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SHOW PIPELINE ───────────────────────────────────────
function PipelinePage({ shows, setShows }) {
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("date");
  const nextId = Math.max(...shows.map(s => s.id), 0) + 1;

  const addShow = () => {
    setShows([...shows, { id: nextId, name: "New Show", month: "Jan", year: 2026, fee: 3000, status: "hoped", days: 1 }]);
  };

  const updateShow = (id, field, value) => {
    setShows(shows.map(s => s.id === id ? { ...s, [field]: field === "fee" || field === "days" ? (parseFloat(value) || 0) : value } : s));
  };

  const removeShow = (id) => setShows(shows.filter(s => s.id !== id));

  const filtered = shows.filter(s => filter === "all" || s.status === filter);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "date") return (a.year * 12 + monthIndex(a.month)) - (b.year * 12 + monthIndex(b.month));
    if (sortBy === "fee") return b.fee - a.fee;
    return 0;
  });

  const totals = {
    confirmed: shows.filter(s => s.status === "confirmed").reduce((s, sh) => s + sh.fee, 0),
    likely: shows.filter(s => s.status === "likely").reduce((s, sh) => s + sh.fee, 0),
    hoped: shows.filter(s => s.status === "hoped").reduce((s, sh) => s + sh.fee, 0),
  };
  const weighted = totals.confirmed + totals.likely * 0.7 + totals.hoped * 0.4;

  return (
    <div>
      {/* Pipeline Summary Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <KPICard label="Confirmed" value={fmtK(totals.confirmed)} color={C.green} icon="✅"
          subtitle={`${shows.filter(s => s.status === "confirmed").length} shows`} />
        <KPICard label="Likely (70%)" value={fmtK(totals.likely)} color={C.accent} icon="🎯"
          subtitle={`${shows.filter(s => s.status === "likely").length} shows`} />
        <KPICard label="Hoped (40%)" value={fmtK(totals.hoped)} color={C.blue} icon="🤞"
          subtitle={`${shows.filter(s => s.status === "hoped").length} shows`} />
        <KPICard label="Weighted Total" value={fmtK(weighted)} color={C.purple} icon="⚡"
          subtitle="Probability-adjusted" />
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center" }}>
        {["all", "confirmed", "likely", "hoped"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600,
              background: filter === f ? C.accent : C.surfaceLight,
              color: filter === f ? C.bg : C.textMuted }}>
            {f === "all" ? `All (${shows.length})` : `${STATUS_CONFIG[f]?.label} (${shows.filter(s => s.status === f).length})`}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          style={{ background: C.surfaceLight, color: C.text, border: `1px solid ${C.border}`, borderRadius: 6,
            padding: "6px 10px", fontSize: 12 }}>
          <option value="date">Sort by Date</option>
          <option value="fee">Sort by Fee</option>
        </select>
        <button onClick={addShow}
          style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer",
            background: C.green, color: "#fff", fontSize: 12, fontWeight: 700 }}>
          + Add Show
        </button>
      </div>

      {/* Show Table */}
      <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {["Show", "Date", "Days", "Fee", "Status", "Weighted", ""].map((h, i) => (
                <th key={i} style={{ padding: "10px 12px", textAlign: i >= 2 ? "right" : "left",
                  fontSize: 10, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map(show => (
              <tr key={show.id} style={{ borderBottom: `1px solid ${C.border}22` }}
                onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <td style={{ padding: "8px 12px" }}>
                  <EditableText value={show.name} onChange={v => updateShow(show.id, "name", v)}
                    style={{ fontSize: 13, fontWeight: 600, color: C.text }} />
                </td>
                <td style={{ padding: "8px 12px" }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <select value={show.month} onChange={e => updateShow(show.id, "month", e.target.value)}
                      style={{ background: C.bg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 4px", fontSize: 12 }}>
                      {MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                    </select>
                    <select value={show.year} onChange={e => updateShow(show.id, "year", parseInt(e.target.value))}
                      style={{ background: C.bg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 4px", fontSize: 12 }}>
                      {[2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right" }}>
                  <EditableCell value={show.days} prefix="" onChange={v => updateShow(show.id, "days", v)} />
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right", fontWeight: 700, color: C.green }}>
                  <EditableCell value={show.fee} onChange={v => updateShow(show.id, "fee", v)} />
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right" }}>
                  <select value={show.status} onChange={e => updateShow(show.id, "status", e.target.value)}
                    style={{ background: "transparent", color: STATUS_CONFIG[show.status].color,
                      border: `1px solid ${STATUS_CONFIG[show.status].color}44`, borderRadius: 10,
                      padding: "3px 8px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                    <option value="confirmed">Confirmed</option>
                    <option value="likely">Likely</option>
                    <option value="hoped">Hoped For</option>
                  </select>
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right", color: C.textMuted, fontSize: 12 }}>
                  {fmt(show.fee * STATUS_CONFIG[show.status].prob)}
                </td>
                <td style={{ padding: "8px 12px", textAlign: "right" }}>
                  <button onClick={() => removeShow(show.id)}
                    style={{ background: "none", border: "none", color: C.textDim, cursor: "pointer", fontSize: 14, padding: 4 }}
                    onMouseEnter={e => e.currentTarget.style.color = C.red}
                    onMouseLeave={e => e.currentTarget.style.color = C.textDim}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── MONTHLY COSTS ───────────────────────────────────────
function CostsPage({ costGroups, setCostGroups }) {
  const totalMonthly = costGroups.filter(g => g.enabled).reduce((s, g) =>
    s + g.items.filter(i => i.enabled).reduce((si, i) => si + i.amount, 0), 0);

  const toggleGroup = (gid) => setCostGroups(costGroups.map(g => g.id === gid ? { ...g, enabled: !g.enabled } : g));
  const toggleItem = (gid, iid) => setCostGroups(costGroups.map(g => g.id === gid ? {
    ...g, items: g.items.map(i => i.id === iid ? { ...i, enabled: !i.enabled } : i)
  } : g));
  const updateAmount = (gid, iid, val) => setCostGroups(costGroups.map(g => g.id === gid ? {
    ...g, items: g.items.map(i => i.id === iid ? { ...i, amount: val } : i)
  } : g));
  const addItem = (gid) => setCostGroups(costGroups.map(g => g.id === gid ? {
    ...g, items: [...g.items, { id: `item_${Date.now()}`, name: "New Item", amount: 0, enabled: true }]
  } : g));
  const removeItem = (gid, iid) => setCostGroups(costGroups.map(g => g.id === gid ? {
    ...g, items: g.items.filter(i => i.id !== iid)
  } : g));
  const updateItemName = (gid, iid, name) => setCostGroups(costGroups.map(g => g.id === gid ? {
    ...g, items: g.items.map(i => i.id === iid ? { ...i, name } : i)
  } : g));
  const renameGroup = (gid, name) => setCostGroups(costGroups.map(g => g.id === gid ? { ...g, name } : g));
  const removeGroup = (gid) => setCostGroups(costGroups.filter(g => g.id !== gid));
  const addGroup = () => setCostGroups([...costGroups, {
    id: `grp_${Date.now()}`, name: "New Group", icon: "📁", enabled: true, items: []
  }]);

  const pieData = costGroups.filter(g => g.enabled).map(g => ({
    name: g.name, value: g.items.filter(i => i.enabled).reduce((s, i) => s + i.amount, 0), icon: g.icon,
  })).filter(d => d.value > 0);
  const PIE_COLORS = [C.blue, C.green, C.accent, C.purple, C.orange, C.cyan, C.pink];

  return (
    <div>
      {/* Summary */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <KPICard label="Total Monthly" value={fmt(totalMonthly)} color={C.red} icon="📊"
          subtitle={`${costGroups.filter(g => g.enabled).length}/${costGroups.length} groups active`} />
        <KPICard label="Annual Estimate" value={fmtK(totalMonthly * 12)} color={C.orange} icon="📅"
          subtitle="Based on current monthly" />
        <div style={{ background: C.surface, borderRadius: 10, padding: "12px 16px", flex: 1.5, minWidth: 200,
          border: `1px solid ${C.border}`, display: "flex", alignItems: "center" }}>
          <ResponsiveContainer width="100%" height={100}>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%"
                innerRadius={25} outerRadius={42} paddingAngle={2}>
                {pieData.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
              </Pie>
              <Tooltip content={<ChartTooltip />} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ marginLeft: 8, fontSize: 10 }}>
            {pieData.map((d, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 2 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", backgroundColor: PIE_COLORS[i % PIE_COLORS.length] }} />
                <span style={{ color: C.textMuted }}>{d.icon} {fmt(d.value)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Cost Groups */}
      {costGroups.map(group => {
        const groupTotal = group.items.filter(i => i.enabled).reduce((s, i) => s + i.amount, 0);
        return (
          <div key={group.id} style={{ background: C.surface, borderRadius: 10, marginBottom: 12,
            border: `1px solid ${group.enabled ? C.border : C.border + "44"}`, opacity: group.enabled ? 1 : 0.5,
            transition: "all 0.2s" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "12px 16px", borderBottom: group.enabled ? `1px solid ${C.border}22` : "none" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Toggle on={group.enabled} onChange={() => toggleGroup(group.id)} />
                <span style={{ fontSize: 18 }}>{group.icon}</span>
                <EditableText value={group.name} onChange={v => renameGroup(group.id, v)}
                  style={{ fontSize: 14, fontWeight: 700, color: C.text }} />
                <span style={{ fontSize: 12, color: C.textMuted }}>({group.items.length})</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 15, fontWeight: 800, color: group.enabled ? C.accent : C.textDim }}>
                  {fmt(groupTotal)}<span style={{ fontSize: 11, fontWeight: 500, color: C.textMuted }}>/mo</span>
                </span>
                <IconBtn icon="🗑️" onClick={() => removeGroup(group.id)} title="Delete group" hoverColor={C.red} />
              </div>
            </div>
            {group.enabled && (
              <div style={{ padding: "4px 16px 12px" }}>
                {group.items.map(item => (
                  <div key={item.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "6px 0", borderBottom: `1px solid ${C.border}11` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1 }}>
                      <Toggle on={item.enabled} onChange={() => toggleItem(group.id, item.id)} size="sm" />
                      <EditableText value={item.name} onChange={v => updateItemName(group.id, item.id, v)}
                        style={{ fontSize: 13, color: item.enabled ? C.text : C.textDim }} />
                      {item.note && <span style={{ fontSize: 10, color: C.textDim, fontStyle: "italic" }}>({item.note})</span>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: item.enabled ? C.text : C.textDim }}>
                        <EditableCell value={item.amount} onChange={v => updateAmount(group.id, item.id, v)} />
                        <span style={{ fontSize: 10, color: C.textMuted }}>/mo</span>
                      </span>
                      <IconBtn icon="✕" onClick={() => removeItem(group.id, item.id)} />
                    </div>
                  </div>
                ))}
                <AddButton label="+ Add Item" onClick={() => addItem(group.id)} style={{ marginTop: 6, fontSize: 11, padding: "4px 12px" }} />
              </div>
            )}
          </div>
        );
      })}
      <AddButton label="+ Add Cost Group" onClick={addGroup} style={{ marginTop: 4, width: "100%", padding: "10px 0" }} />
    </div>
  );
}

// ─── PROJECTS ────────────────────────────────────────────
function ProjectsPage({ projects, setProjects }) {
  const toggleProject = (pid) => setProjects(projects.map(p => p.id === pid ? { ...p, enabled: !p.enabled } : p));
  const renameProject = (pid, name) => setProjects(projects.map(p => p.id === pid ? { ...p, name } : p));
  const removeProject = (pid) => setProjects(projects.filter(p => p.id !== pid));
  const updateProjectItem = (pid, iid, field, value) => setProjects(projects.map(p => p.id === pid ? {
    ...p, items: p.items.map(i => i.id === iid ? { ...i, [field]: value } : i)
  } : p));
  const removeProjectItem = (pid, iid) => setProjects(projects.map(p => p.id === pid ? {
    ...p, items: p.items.filter(i => i.id !== iid)
  } : p));
  const addProjectItem = (pid, type) => setProjects(projects.map(p => p.id === pid ? {
    ...p, items: [...p.items, type === "one-off"
      ? { id: `pi_${Date.now()}`, name: "New Item", amount: 0, type: "one-off", month: "Jan", year: 2026 }
      : { id: `pi_${Date.now()}`, name: "New Item", amount: 0, type: "monthly", startMonth: "Jan", startYear: 2026 }
    ]
  } : p));
  const addProject = () => setProjects([...projects, {

// ─── VAT & TAX ───────────────────────────────────────────
function VATPage({ data, vatSettings }) {
  // Calculate quarterly VAT
  const vatQuarters = {};
  data.forEach(d => {
    const qi = Math.floor(d.monthIdx / 3) + 1;
    const qk = `Q${qi} ${d.year}`;
    if (!vatQuarters[qk]) vatQuarters[qk] = { income: 0, costs: 0, label: qk, months: [] };
    vatQuarters[qk].income += d.income;
    vatQuarters[qk].costs += d.totalCosts;
    vatQuarters[qk].months.push(d.label);
  });

  const vatData = Object.values(vatQuarters).map(q => {
    const vatOnSales = q.income * vatSettings.rate;
    const vatOnPurchases = q.costs * vatSettings.reclaimRate;
    const vatDue = vatOnSales - vatOnPurchases;
    return { ...q, vatOnSales, vatOnPurchases, vatDue };
  });

  const totalVatDue = vatData.reduce((s, q) => s + q.vatDue, 0);

  return (
    <div>
      {/* VAT Settings */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16,
        border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>VAT Settings</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16 }}>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>VAT Rate</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.accent }}>{(vatSettings.rate * 100).toFixed(0)}%</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>Payment Frequency</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>Quarterly</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>Payment Delay</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>1 month after quarter end</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>Total VAT Forecast</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.red }}>{fmtK(totalVatDue)}</div>
          </div>
        </div>
      </div>

      {/* VAT Breakdown */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, marginBottom: 16,
        border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>Quarterly VAT Summary</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {["Quarter", "Income", "VAT on Sales", "VAT on Purchases", "VAT Due", "Payment Month"].map((h, i) => (
                <th key={i} style={{ padding: "8px 12px", textAlign: i === 0 ? "left" : "right",
                  fontSize: 10, fontWeight: 700, color: C.textDim, textTransform: "uppercase" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {vatData.map((q, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${C.border}22` }}>
                <td style={{ padding: "10px 12px", fontWeight: 600, color: C.text, fontSize: 13 }}>{q.label}</td>
                <td style={{ padding: "10px 12px", textAlign: "right", color: C.green, fontSize: 13 }}>{fmt(q.income)}</td>
                <td style={{ padding: "10px 12px", textAlign: "right", color: C.red, fontSize: 13 }}>{fmt(q.vatOnSales)}</td>
                <td style={{ padding: "10px 12px", textAlign: "right", color: C.green, fontSize: 13 }}>{fmt(q.vatOnPurchases)}</td>
                <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 700,
                  color: q.vatDue > 0 ? C.red : C.green, fontSize: 13 }}>{fmt(q.vatDue)}</td>
                <td style={{ padding: "10px 12px", textAlign: "right", color: C.textMuted, fontSize: 12 }}>
                  {q.months.length > 0 ? `+1mo after ${q.months[q.months.length - 1]}` : "—"}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* VAT Chart */}
      <div style={{ background: C.surface, borderRadius: 10, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>VAT Cashflow Impact</div>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={vatData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.textMuted, fontSize: 11 }} />
            <YAxis tick={{ fill: C.textMuted, fontSize: 11 }} tickFormatter={fmtK} />
            <Tooltip content={<ChartTooltip />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <Bar dataKey="vatOnSales" name="VAT Collected" fill={C.red} opacity={0.7} radius={[3, 3, 0, 0]} />
            <Bar dataKey="vatOnPurchases" name="VAT Reclaimable" fill={C.green} opacity={0.7} radius={[3, 3, 0, 0]} />
            <Bar dataKey="vatDue" name="Net VAT Due" fill={C.orange} opacity={0.8} radius={[3, 3, 0, 0]} />
          </BarChart>

      </div>
    </div>
  );

// ─── SCENARIOS ───────────────────────────────────────────
function ScenariosPage({ shows, costGroups, projects, otherIncome, openingBalance, monthRange, vatSettings }) {
  const scenarioResults = {};
  Object.entries(SCENARIOS).forEach(([key, sc]) => {
    let balance = openingBalance;
    let vatAcc = 0;
    const sdata = monthRange.map((mr) => {
      const mi = monthIndex(mr.month);
      const monthShows = shows.filter(s => s.month === mr.month && s.year === mr.year);
      let oiTotal = 0;
      otherIncome.filter(oi => oi.enabled).forEach(oi => {
        if (oi.type === "one-off" && oi.month === mr.month && oi.year === mr.year) oiTotal += oi.amount;
        if (oi.type === "monthly") { const sk = monthKey(oi.startMonth, oi.startYear); if (mr.key >= sk) oiTotal += oi.amount; }
      });
      const income = (monthShows.reduce((s, sh) => s + sh.fee * STATUS_CONFIG[sh.status].prob, 0) + oiTotal) * sc.incMult;
      const fixedCosts = costGroups.filter(g => g.enabled).reduce((s, g) =>
        s + g.items.filter(i => i.enabled).reduce((si, i) => si + i.amount, 0), 0) * sc.costMult;
      let projectCosts = 0;
      projects.filter(p => p.enabled).forEach(p => {
        p.items.forEach(item => {
          if (item.type === "one-off" && item.month === mr.month && item.year === mr.year) projectCosts += item.amount;
          if (item.type === "monthly") {
            const startK = monthKey(item.startMonth, item.startYear);
            if (mr.key >= startK) projectCosts += item.amount;
          }
        });
      });
      const vatCollected = income * vatSettings.rate;
      const vatOnPurchases = (fixedCosts + projectCosts) * vatSettings.reclaimRate;
      vatAcc += vatCollected - vatOnPurchases;
      let vatPayment = 0;
      if ([0, 3, 6, 9].includes(mi)) { vatPayment = Math.max(vatAcc, 0); vatAcc = 0; }
      const totalCosts = fixedCosts + projectCosts + vatPayment;
      balance += income - totalCosts;
      return { ...mr, monthIdx: mi, income, totalCosts, balance };
    });
    scenarioResults[key] = sdata;
  });

  // Combine for chart
  const chartData = monthRange.map((mr, i) => ({
    label: mr.label,
    expected: scenarioResults.expected[i]?.balance || 0,
    optimistic: scenarioResults.optimistic[i]?.balance || 0,
    pessimistic: scenarioResults.pessimistic[i]?.balance || 0,
  }));

  return (

// ═══════════════════════════════════════════════════════════
// MAIN APP

function SparkCashflow() {
  const [page, setPage] = useState("dashboard");
  const [scenario, setScenario] = useState("expected");
  const [timeframe, setTimeframe] = useState(12);
  const [openingBalance, setOpeningBalance] = useState(DEFAULT_OPENING_BALANCE);
  const [shows, setShows] = useState(DEFAULT_SHOWS);
  const [costGroups, setCostGroups] = useState(DEFAULT_COST_GROUPS);
  const [projects, setProjects] = useState(DEFAULT_PROJECTS);
  const [otherIncome, setOtherIncome] = useState(DEFAULT_OTHER_INCOME);
  const [vatSettings] = useState({ rate: 0.20, reclaimRate: 0.05, paymentDelay: 1 });

  // Generate month range
  const monthRange = useMemo(() => generateMonthRange(2026, 0, timeframe), [timeframe]);

  // Core calculation
  const data = useMemo(() => {
    const sc = SCENARIOS[scenario];
    let balance = openingBalance;
    let vatAccumulator = 0;

    return monthRange.map((mr) => {
      const mi = monthIndex(mr.month);

      // Show income
      const monthShows = shows.filter(s => s.month === mr.month && s.year === mr.year);
      const rawShowIncome = monthShows.reduce((s, sh) => s + sh.fee * STATUS_CONFIG[sh.status].prob, 0);

      // Other income
      let otherIncomeTotal = 0;
      otherIncome.filter(oi => oi.enabled).forEach(oi => {
        if (oi.type === "one-off" && oi.month === mr.month && oi.year === mr.year) otherIncomeTotal += oi.amount;
        if (oi.type === "monthly") {
          const startK = monthKey(oi.startMonth, oi.startYear);
          if (mr.key >= startK) otherIncomeTotal += oi.amount;
        }
      });

      const income = (rawShowIncome + otherIncomeTotal) * sc.incMult;

      // Fixed costs
      const rawFixed = costGroups.filter(g => g.enabled).reduce((s, g) =>
        s + g.items.filter(i => i.enabled).reduce((si, i) => si + i.amount, 0), 0);
      const fixedCosts = rawFixed * sc.costMult;

      // Project costs
      let projectCosts = 0;
      projects.filter(p => p.enabled).forEach(p => {
        p.items.forEach(item => {
          if (item.type === "one-off" && item.month === mr.month && item.year === mr.year) {
            projectCosts += item.amount;
          }
          if (item.type === "monthly") {
            const startK = monthKey(item.startMonth, item.startYear);
            if (mr.key >= startK) projectCosts += item.amount;
          }
        });
      });

      // VAT — simplified: collect on income, pay quarterly with 1 month delay
      const vatCollected = income * vatSettings.rate;
      const vatOnPurchases = (fixedCosts + projectCosts) * vatSettings.reclaimRate;
      vatAccumulator += vatCollected - vatOnPurchases;

      let vatPayment = 0;
      // Pay VAT one month after quarter end (quarters: Mar, Jun, Sep, Dec → pay Apr, Jul, Oct, Jan)
      if ([0, 3, 6, 9].includes(mi)) { // Jan, Apr, Jul, Oct
        vatPayment = Math.max(vatAccumulator, 0);
        vatAccumulator = 0;
      }

      const totalCosts = fixedCosts + projectCosts + vatPayment;
      balance += income - totalCosts;

      return {
        ...mr, monthIdx: mi, income, fixedCosts, projectCosts, vatPayment, totalCosts, balance,
        showCount: monthShows.length, otherIncome: otherIncomeTotal,
      };
    });
  }, [shows, costGroups, projects, otherIncome, openingBalance, scenario, monthRange, vatSettings]);

  // Page title
  const pageTitle = NAV_ITEMS.find(n => n.id === page)?.label || "Dashboard";

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.bg, fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: C.text }}>
      <Sidebar active={page} onNav={setPage} scenario={scenario} onScenario={setScenario}
        timeframe={timeframe} onTimeframe={setTimeframe} />

      {/* Main Content */}
      <div style={{ flex: 1, marginLeft: 220, padding: "20px 28px", maxWidth: 1200 }}>
        {/* Top Bar */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: C.text }}>{pageTitle}</h1>
            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>
              {SCENARIOS[scenario].label} scenario · {timeframe} months from Jan 2026
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ background: C.surface, borderRadius: 8, padding: "8px 14px",
              border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: C.textMuted }}>Opening Balance</span>
              <span style={{ fontSize: 15, fontWeight: 800, color: C.accent }}>
                <EditableCell value={openingBalance} onChange={setOpeningBalance} />
              </span>
            </div>
          </div>
        </div>

        {/* Page Content */}
        {page === "dashboard" && <DashboardPage data={data} openingBalance={openingBalance} scenario={scenario} />}
        {page === "pipeline" && <PipelinePage shows={shows} setShows={setShows} />}
        {page === "other_income" && <OtherIncomePage otherIncome={otherIncome} setOtherIncome={setOtherIncome} />}
        {page === "costs" && <CostsPage costGroups={costGroups} setCostGroups={setCostGroups} />}
        {page === "projects" && <ProjectsPage projects={projects} setProjects={setProjects} />}
        {page === "vat" && <VATPage data={data} vatSettings={vatSettings} />}
        {page === "monthly" && <MonthlyDetailPage data={data} />}
        {page === "scenarios" && <ScenariosPage shows={shows} costGroups={costGroups} projects={projects}
          otherIncome={otherIncome} openingBalance={openingBalance} monthRange={monthRange} vatSettings={vatSettings} />}
      </div>
    </div>
  );
}

          let vatPayment = 0;

    function AppWrapper() {
      const [authState, setAuthState] = useState('checking'); // checking, login, ready

      useEffect(() => {
        API.checkAuth().then(authed => {
          if (authed) {
            API.loadData().then(data => {
              if (data) {
                window.__SPARK_INITIAL_DATA = data;
              }
              setAuthState('ready');
            });
          } else {
            setAuthState('login');
          }
        });
      }, []);

      const handleLogin = () => {
        API.loadData().then(data => {
          if (data) {
            window.__SPARK_INITIAL_DATA = data;
          }
          setAuthState('ready');
        });
      };

      if (authState === 'checking') {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh',
            background: '#0f172a', color: '#94a3b8', fontSize: 14 }}>
            <span style={{ display: 'inline-block', width: 16, height: 16, border: '2px solid #f59e0b',
              borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.6s linear infinite',
              marginRight: 8 }} /> Loading...
          </div>
        );
      }

      if (authState === 'login') {
        return <LoginScreen onLogin={handleLogin} />;
      }

      return <SparkCashflowWithSave />;
    }

    // ═══════════════════════════════════════════════════════════
    // MOUNT
    // ═══════════════════════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWrapper />);
  </script>
</body>
</html>
